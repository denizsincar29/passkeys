<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Passkey Demo</title>
  <style>
    body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
    input { padding: 8px; margin-bottom: 10px; width: 200px; }
    button { padding: 8px 16px; cursor: pointer; }
    #out { background: #f4f4f4; padding: 10px; border-radius: 4px; min-height: 50px; white-space: pre-wrap; }
    #notes-section { margin-top: 30px; display: none; }
    #notes-editor { width: 100%; height: 200px; padding: 10px; margin-bottom: 10px; font-family: monospace; }
    #notes-preview { background: #fff; border: 1px solid #ddd; padding: 10px; border-radius: 4px; min-height: 100px; }
  </style>
    <script src="https://unpkg.com/@github/webauthn-json@2.1.1/dist/browser-global/webauthn-json.browser-global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <h2>Passkey Demo</h2>

  <input id="username" name="username" autocomplete="username webauthn" placeholder="username" />
  <br>
  <button onclick="registerPasskey()">Register</button>
  <button onclick="loginPasskey()">Login</button>
  <button onclick="discoveryLogin()">Discovery Login</button>

  <h4>Output:</h4>
  <pre id="out">Ready...</pre>

  <div id="notes-section">
    <h3>My Markdown Notes</h3>
    <textarea id="notes-editor" placeholder="Type your notes here..."></textarea>
    <br>
    <button onclick="saveNotes()">Save Notes</button>
    <h4>Preview:</h4>
    <div id="notes-preview"></div>
  </div>


<script type="module">
import { create, get } from "https://cdn.jsdelivr.net/npm/@github/webauthn-json@2.1.1/dist/esm/webauthn-json.js";

const out = (t) => {
  const output = document.getElementById("out");
  output.textContent = typeof t === 'object' ? JSON.stringify(t, null, 2) : t;
};

// === REGISTER ===
window.registerPasskey = async () => {
  const username = document.getElementById("username").value;
  if (!username) return out("Введите имя");

  try {
    const res = await fetch(`/auth/passkey/registerBegin`, {
      method: "POST",
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username })
    });
    if (!res.ok) throw new Error(await res.text());
    const options = await res.json();

    const cc = await create(options);

    const finish = await fetch(`/auth/passkey/registerFinish`, {
      method: "POST",
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ...cc, username })
    });

    const result = await finish.json();
    out(result);
    if (result === "Login Success" || result === "Registration Success") {
        await loadNotes();
    }
  } catch (err) {
    out("Ошибка: " + err.message);
  }
};

// === LOGIN BUTTON (fallback) ===
window.loginPasskey = async () => {
  const username = document.getElementById("username").value;
  if (!username) return out("Please enter a username");

  await loginFlow(username, false);
};

// === DISCOVERY LOGIN BUTTON ===
window.discoveryLogin = async () => {
  await loginFlow("", false);
};

// === CORE LOGIN FLOW ===
async function loginFlow(username, conditional = false) {
  try {
    const res = await fetch(`/auth/passkey/loginBegin`, {
      method: "POST",
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username })
    });
    if (!res.ok) throw new Error(await res.text());
    const options = await res.json();

    if (conditional) {
      options.mediation = "conditional";
    }

    const r = await get(options);

    const finish = await fetch(`/auth/passkey/loginFinish`, {
      method: "POST",
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(r)
    });

    const result = await finish.json();
    out(result);
    if (result === "Login Success") {
        await loadNotes();
    }
  } catch (err) {
    if (err.name === 'NotAllowedError' || err.name === 'SecurityError') {
        console.log("WebAuthn prompt ignored or blocked:", err.message);
        return;
    }
    if (!conditional) {
      out("Error: " + err.message);
    }
  }
}

// === AUTO DETECT / AUTOLOGIN ===
async function autoLogin() {
  if (!window.PublicKeyCredential) return;

  // 1. Try Conditional UI (autofill)
  if (PublicKeyCredential.isConditionalMediationAvailable) {
    const available = await PublicKeyCredential.isConditionalMediationAvailable();
    if (available) {
      loginFlow("", true); // Don't await, it runs in background waiting for user interaction
    }
  }

  // 2. Immediate prompt for passkey as requested
  // We'll wait a tiny bit to not clash too much with initial load, or just fire it
  setTimeout(async () => {
      try {
          // Only prompt if the user hasn't started typing or interacting much yet?
          // Actually, the request was "immediately ask if i wanna use my passkey"
          await loginFlow("", false);
      } catch (e) {
          console.log("Immediate prompt dismissed or failed", e);
      }
  }, 1000);
}

// === NOTES HANDLERS ===
window.saveNotes = async () => {
    const notes = document.getElementById("notes-editor").value;
    try {
        const res = await fetch("/notes/save", {
            method: "POST",
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ notes })
        });
        const result = await res.json();
        out(result);
        updatePreview();
    } catch (err) {
        out("Error: " + err.message);
    }
};

async function loadNotes() {
    try {
        const res = await fetch("/notes/get");
        if (!res.ok) return;
        const data = await res.json();
        document.getElementById("notes-editor").value = data.notes || "";
        document.getElementById("notes-section").style.display = "block";
        updatePreview();
    } catch (err) {
        console.error("Could not load notes", err);
    }
}

function updatePreview() {
    const notes = document.getElementById("notes-editor").value;
    document.getElementById("notes-preview").innerHTML = marked.parse(notes || "");
}

document.getElementById("notes-editor").addEventListener("input", updatePreview);

// Start autodiscovery on load
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => {
        autoLogin();
        loadNotes(); // Try to load notes if already logged in
    });
} else {
    autoLogin();
    loadNotes();
}
</script>
</body>
</html>
